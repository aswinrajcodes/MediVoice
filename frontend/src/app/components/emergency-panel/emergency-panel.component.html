@switch (level) {
  @case ('high') {
    <div class="emergency-overlay">
      <div class="emergency-card">
        <div class="emergency-icon">🚨</div>
        <h1>MEDICAL EMERGENCY DETECTED</h1>
        <p class="emergency-reason">{{ reason }}</p>
        <p>Based on your symptoms, you may need <strong>immediate medical attention</strong>.</p>

        <div class="emergency-actions">
          <a href="tel:911" class="btn-emergency">
            📞 CALL 911
          </a>
          <a href="tel:18002221222" class="btn-poison">
            ☎️ Poison Control: 1-800-222-1222
          </a>
          <a href="https://www.google.com/maps/search/emergency+room+near+me"
             target="_blank" rel="noopener" class="btn-er">
            🏥 Find Nearest ER
          </a>
        </div>

        <button class="btn-dismiss" (click)="dismiss()">
          I understand — continue with MediVoice
        </button>
      </div>
    </div>
  }
  @case ('medium') {
    <div class="medium-alert-bar">
      <span>⚠️ {{ reason }} — Consider seeking medical attention soon.</span>
      <button class="alert-dismiss" (click)="dismiss()">✕</button>
    </div>
  }
}
