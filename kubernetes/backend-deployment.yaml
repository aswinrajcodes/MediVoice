apiVersion: apps/v1
kind: Deployment
metadata:
  name: medivoice-backend
  namespace: medivoice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medivoice-backend
  template:
    metadata:
      labels:
        app: medivoice-backend
    spec:
      containers:
      - name: backend
        image: gcr.io/medivoice-hackathon/medivoice-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: medivoice-secrets
              key: gemini-api-key
        - name: POSTGRES_URL
          value: "jdbc:postgresql://postgres-service:5432/medivoice"
        - name: POSTGRES_USER
          value: "medivoice"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medivoice-secrets
              key: postgres-password
        - name: NEO4J_URI
          value: "bolt://neo4j-service:7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medivoice-secrets
              key: neo4j-password
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /api/sessions/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/sessions/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: medivoice
spec:
  selector:
    app: medivoice-backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
