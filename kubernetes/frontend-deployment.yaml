apiVersion: apps/v1
kind: Deployment
metadata:
  name: medivoice-frontend
  namespace: medivoice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medivoice-frontend
  template:
    metadata:
      labels:
        app: medivoice-frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/medivoice-hackathon/medivoice-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: medivoice
spec:
  selector:
    app: medivoice-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
