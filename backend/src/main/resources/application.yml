server:
  port: 8080

spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/medivoice}
    username: ${POSTGRES_USER:medivoice}
    password: ${POSTGRES_PASSWORD:medivoice}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:medivoice}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: medivoice-group
      auto-offset-reset: earliest

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  data:
    neo4j:
      database: neo4j

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash-native-audio-preview
  project-id: ${GCP_PROJECT_ID:}
  location: ${GCP_LOCATION:us-central1}

websocket:
  message-size-limit: 10485760
  allowed-origins: "*"

gcs:
  bucket: ${GCS_TRANSCRIPT_BUCKET:medivoice-transcripts}
  enabled: ${GCS_ENABLED:false}

logging:
  level:
    com.medivoice: DEBUG
    org.springframework.web.socket: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
